{% extends 'core/base.html' %}
{% block content %}

<div class="container mt-5 mb-5">
  <div class="card shadow-lg border-0 p-4 rounded-4">
    <h3 class="text-center text-primary mb-4 fw-bold">
      <i class="fa-solid fa-pen-to-square me-2"></i> Edit Lesson
    </h3>

    <!-- Edit Lesson Form -->
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Lesson Title -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Lesson Title</label>
        <input 
          type="text" 
          name="title" 
          value="{{ lesson.title }}" 
          class="form-control" 
          placeholder="Enter lesson title" 
          required
        >
      </div>

      <!-- Lesson Description -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Description</label>
        <textarea 
          name="description" 
          rows="3" 
          class="form-control" 
          placeholder="Write a short description..." 
          required
        >{{ lesson.description }}</textarea>
      </div>

      <!-- Lesson Content -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Lesson Content</label>
        <textarea 
          name="content" 
          rows="6" 
          class="form-control" 
          placeholder="Enter detailed lesson content..." 
          required
        >{{ lesson.content }}</textarea>
      </div>

      <!-- Video URL -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Video URL</label>
        <input 
          type="url" 
          name="video_url" 
          value="{{ lesson.video_url }}" 
          class="form-control" 
          placeholder="https://example.com/video"
        >
      </div>

      <!-- Buttons -->
      <div class="text-center mt-4">
        <button type="submit" class="btn btn-success px-4">
          <i class="fa-solid fa-check me-1"></i> Save Changes
        </button>
        <a href="{% url 'core:instructor_dashboard' %}" class="btn btn-secondary px-4 ms-2">
    Cancel
</a>

      </div>
    </form>
  </div>
</div>

{% endblock %}
