{% extends 'core/base.html' %}
{% block content %}

<div class="container my-5">
  <div class="card shadow-lg border-0 rounded-4">
    <!-- Header -->
    <div class="card-header bg-gradient text-white text-center py-3" 
         style="background: linear-gradient(135deg, #4e54c8, #8f94fb); border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
      <h3 class="fw-bold mb-0">
        <i class="fa-solid fa-circle-plus me-2"></i> Add New Lesson
      </h3>
    </div>

    <!-- Form Body -->
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data" class="row g-4" novalidate>
        {% csrf_token %}

        <!-- Lesson Title -->
        <div class="col-md-6">
          <label for="id_title" class="form-label fw-semibold">Lesson Title</label>
          {{ form.title }}
        </div>

        <!-- Lesson Order -->
        <div class="col-md-6">
          <label for="id_order" class="form-label fw-semibold">Order (Lesson Number)</label>
          {{ form.order }}
        </div>

        <!-- Content -->
        <div class="col-12">
          <label for="id_content" class="form-label fw-semibold">Content / Description</label>
          {{ form.content }}
        </div>

        <!-- Video Upload -->
        <div class="col-12">
          <label for="id_video" class="form-label fw-semibold">Video (optional)</label>
          {{ form.video }}
        </div>

        <!-- Buttons -->
        <div class="col-12 text-center mt-4">
          <button type="submit" class="btn btn-custom px-5 py-2">
            <i class="fa-solid fa-floppy-disk me-2"></i> Save Lesson
          </button>
          <a href="{% url 'core:instructor_dashboard' %}" 
             class="btn btn-outline-secondary px-4 py-2 ms-2 rounded-pill">
            <i class="fa-solid fa-arrow-left me-1"></i> Back
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Inline Styling for Form Inputs -->
<style>
  form input, form textarea, form select {
    border-radius: 10px !important;
    border: 1px solid #ccc !important;
    padding: 10px !important;
    width: 100%;
  }

  form input:focus, form textarea:focus, form select:focus {
    border-color: #4e54c8 !important;
    box-shadow: 0 0 0 0.15rem rgba(78, 84, 200, 0.25);
    outline: none;
  }

  @media (max-width: 768px) {
    .card {
      margin: 15px;
    }
    button {
      width: 100%;
      margin-bottom: 10px;
    }
  }
</style>

{% endblock %}
