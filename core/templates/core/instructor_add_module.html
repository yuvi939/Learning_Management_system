{% extends 'core/base.html' %}
{% block content %}
<div class="container py-5">
  <div class="card shadow-lg border-0 rounded-4 p-4 mx-auto" style="max-width: 600px;">
    
    <h3 class="fw-bold text-center text-primary mb-3">
      <i class="fa-solid fa-layer-group"></i> Add Module
    </h3>
    <p class="text-center text-muted mb-4">
      Add a new section or module for the course: <strong>{{ course.title }}</strong>
    </p>

    <form method="POST">
      {% csrf_token %}
      
      <!-- Render form fields with consistent Bootstrap styling -->
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors|striptags }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <div class="text-center">
        <button type="submit" class="btn btn-success rounded-pill px-4 me-2">
          <i class="fa-solid fa-circle-check"></i> Add Module
        </button>
        <a href="{% url 'core:course_detail' course.id %}" class="btn btn-secondary rounded-pill px-4">
          <i class="fa-solid fa-arrow-left"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
