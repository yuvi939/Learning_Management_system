{% extends 'core/base.html' %}
{% block content %}

<div class="container my-5">

  <!-- 🎓 Lesson Header -->
  <div class="card shadow-lg border-0 rounded-4 mb-4">
    <div class="card-body p-4">
      <h2 class="fw-bold text-primary mb-2">
        <i class="fa-solid fa-book-open-reader"></i> {{ lesson.title }}
      </h2>
      <p class="text-muted mb-0">
        <i class="fa-solid fa-layer-group"></i> Part of 
        <strong class="text-dark">{{ course.title }}</strong>
      </p>
    </div>
  </div>

  <!-- 📖 Lesson Content -->
  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
      <div class="lesson-content fs-6 lh-lg">
        {{ lesson.content|safe }}
      </div>
    </div>
  </div>

  <!-- 🔙 Navigation -->
  <div class="mt-4 text-center">
    <a href="{% url 'core:course_detail' course.slug %}" class="btn btn-outline-primary rounded-pill px-4 py-2">
      <i class="fa-solid fa-arrow-left-long"></i> Back to Course
    </a>
  </div>

</div>

{% endblock %}
